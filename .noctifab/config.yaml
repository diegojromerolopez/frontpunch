config_version: "1.0"
orchestrator:
    max_tools_per_response: 5
    concurrency: 1
    poll_interval: 5m0s
    max_clarification_wait: 30m0s
    clarification_timeout_action: abort
storage:
    provider: sqlite
    conn_string: .noctifab/data/noctifab.db
    json_file_path: .noctifab/data/state.json
llm:
    provider: gemini
    model: gemini-1.5-pro
    temperature: 0
    api_key: "secret:GEMINI_API_KEY"
    api_key_env: GEMINI_API_KEY
    url: ""
    max_retries: 10
    retry_backoff: 100ms
    retry_backoff_factor: 2
    max_budget_usd: 10
vcs:
    provider: github
    repository: diegojromerolopez/frontpunch
    base_branch: noctifab/feature-US-001-clean
    branch_prefix: noctifab/
    token: "secret:GITHUB_FRONTPUNCH_TOKEN"
    token_env: GITHUB_FRONTPUNCH_TOKEN
    conventional_commits:
        enabled: true
        default_scope: core
    git_mutex_timeout: 30s
    git_operation_retries: 3
    git_retry_backoff: 500ms
sandbox:
    mode: host
    timeout_seconds: 300
    grace_period_seconds: 30
    test_command: python -m unittest discover -s tests
    linter_command: ""
    formatter_command: black --line-length 120 .
    exclude_paths:
        - node_modules/
        - vendor/
        - bin/
        - dist/
        - .noctifab/
    allowed_commands:
        - python
        - git
        - pip
        - ruff
        - black
        - mypy
roles:
    orchestrator:
        model: ""
        temperature: 0
        profile: orchestrator
    planner:
        model: ""
        temperature: 0.5
        profile: planner
    generator:
        model: ""
        temperature: 0
        profile: generator
    tester:
        model: ""
        temperature: 0
        profile: tester
jira:
    user: ""
    token: ""
    url: ""
input: ""
auto_commit: false
max_actions: 100
max_duration: 0s
conversation_mode: sliding-window
max_history_messages: 10
compaction_threshold: 15
max_history_tokens: 4096
shutdown_grace_period: 30s
occ_max_retries: 5
occ_backoff_base: 50ms
occ_backoff_factor: 2
token_usage_limit: 0
log_level: info
log_file: ""
